    var semF = Object.assign({}, t, {
      items: (t.items||[]).map(function(it,i){
        self.savePh(t.id,i,'fProd',it.fProd||[]);
        self.savePh(t.id,i,'fBal',it.fBal||[]);
        self.savePh(t.id,i,'fEtq',it.fEtq||[]);
        return Object.assign({},it,{
          fProd:(it.fProd||[]).map(function(p){ return {id:p.id}; }),
          fBal:(it.fBal||[]).map(function(p){ return {id:p.id}; }),
          fEtq:(it.fEtq||[]).map(function(p){ return {id:p.id}; })
        });
      })
    });
    var mes = t.at.slice(0,7);
    var idx = this.g('flv_idx_'+mes)||[];
    if(idx.indexOf(t.id)<0) idx.push(t.id);
    this.s('flv_idx_'+mes, idx);
    this.s('flv_t_'+t.id, semF);
    var meses = this.g('flv_meses')||[];
    if(meses.indexOf(mes)<0) meses.push(mes);
    meses.sort();
    this.s('flv_meses', meses);
  },
  loadTrat: function(id){
    var t = this.g('flv_t_'+id);
    if(!t) return null;
    var self = this;
    return Object.assign({},t,{
      items:(t.items||[]).map(function(it,i){
        return Object.assign({},it,{
          fProd: self.loadPh(t.id,i,'fProd'),
          fBal:  self.loadPh(t.id,i,'fBal'),
          fEtq:  self.loadPh(t.id,i,'fEtq')
        });
      })
    });
  },
  idsDeMes: function(mes){ return this.g('flv_idx_'+mes)||[]; },
  tratsDeMes: function(mes){
    var self=this;
    return this.idsDeMes(mes).map(function(id){ return self.g('flv_t_'+id); }).filter(Boolean);
  },
  todasTrats: function(){
    var self=this;
    return (this.g('flv_meses')||[]).reduce(function(acc,m){
      return acc.concat(self.tratsDeMes(m));
    },[]).sort(function(a,b){ return a.at<b.at?-1:1; });
  },
  meses: function(){ return this.g('flv_meses')||[]; },
  espacoKB: function(){
    var t=0;
    try{ for(var k in localStorage) t+=localStorage[k].length+k.length; }catch(e){}
    return Math.round(t/1024);
  },
  saveVenda: function(data,valor){
    this.s('flv_venda_'+data,{data:data,valor:valor});
    var mes=data.slice(0,7);
    var meses=this.g('flv_meses')||[];
    if(meses.indexOf(mes)<0){ meses.push(mes); meses.sort(); this.s('flv_meses',meses); }
  },
  vendasDeMes: function(mes){
    var result=[];
    var d=new Date(mes+'-01T12:00:00');
    for(var i=0;i<31;i++){
      var s=d.toISOString().split('T')[0];
      if(s.slice(0,7)!==mes) break;
      var v=this.g('flv_venda_'+s);
      if(v) result.push(v);
      d.setDate(d.getDate()+1);
    }
    return result;
  },
  saveFluig: function(f){
    var mes=f.data.slice(0,7);
    var lista=this.g('flv_fluigs_'+mes)||[];
    var idx=lista.findIndex(function(x){ return x.id===f.id; });
    if(idx>=0) lista[idx]=f; else lista.push(f);
    this.s('flv_fluigs_'+mes,lista);
    var meses=this.g('flv_meses')||[];
    if(meses.indexOf(mes)<0){ meses.push(mes); meses.sort(); this.s('flv_meses',meses); }
  },
  delFluig: function(id,mes){
    var lista=this.g('flv_fluigs_'+mes)||[];
    this.s('flv_fluigs_'+mes, lista.filter(function(x){ return x.id!==id; }));
  },
  fluigsDeMes: function(mes){ return this.g('flv_fluigs_'+mes)||[]; }
};

// HELPERS
// ════════════════════════════════════════════════════
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function todayBR(){  return new Date().toLocaleDateString('pt-BR'); }
function mesAtual(){ return new Date().toISOString().slice(0,7); }
function mesBR(m){
  if(!m) return '';
  var p=m.split('-');
  var ns=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return ns[parseInt(p[1])-1]+'/'+p[0];
}
function parseN(s){ return parseFloat(String(s||0).replace(',','.'))||0; }
function numBR(n){  return parseFloat(n||0).toFixed(1).replace('.',','); }
function numBR0(n){ return Math.round(n||0); }
function numBR2(n){ return parseFloat(n||0).toFixed(2).replace('.',','); }
function uid(){     return Date.now()+'_'+Math.random().toString(36).slice(2,6); }
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pctClr(p,m){ return p>m?'d':p>m*.7?'w':'ok'; }

function waText(items){
  return items.map(function(it){
    var p=ST.prods.filter(function(x){ return x.id===it.prodId; })[0];
    if(!p) return '';
    var dt=it.data?new Date(it.data+'T12:00').toLocaleDateString('pt-BR'):todayBR();
    var un=p.unidade||'kg';
    var fmtQ=function(v){ return un==='un'?String(Math.round(parseN(v))):numBR(v); };
    return 'Cód: '+p.codigo+'\n'+p.nome+'\n'+dt+'\n chegou: '+fmtQ(it.chegou)+' '+un+'\nQuantidade da quebra: '+fmtQ(it.quebra)+' '+un;
  }).filter(Boolean).join('\n\n');
}

    case 'home':      rHome(pc);     break;
    case 'produtos':  rProdutos(pc); break;

  var totalC=todayTs.reduce(function(s,t){ return s+(t.items||[]).reduce(function(a,i){ return a+parseN(i.chegou); },0); },0);
  var pct=totalC>0?totalQ/totalC*100:0;
  var meta=ST.cfg.meta;

    recH='<div style="padding:24px;text-align:center;color:var(--mut)">'+ic('list',28,'var(--mut)')+'<div style="margin-top:8px;font-size:12px;font-weight:600">Nenhuma tratativa este mês</div></div>';
  } else {
    mesTs.slice(0,5).forEach(function(t){
      var codes=(t.items||[]).map(function(i){ var p=ST.prods.filter(function(x){ return x.id===i.prodId; })[0]; return p?p.codigo:null; }).filter(Boolean);
      var kgT=(t.items||[]).reduce(function(s,i){ return s+parseN(i.quebra); },0);

function editP(id){
  var p=ST.prods.filter(function(x){ return x.id===id; })[0];
  if(!p) return;
  pEd=p; pForm={codigo:p.codigo||'',nome:p.nome||'',preco:String(p.preco||''),meta:String(p.meta||'5'),unidade:p.unidade||'kg'};
  pMod='form'; nfPre=false; rProdutos(document.getElementById('pg'));

function delP(id){
  ST.prods=ST.prods.map(function(p){ return p.id===id?Object.assign({},p,{ativo:false}):p; });
  sProds(); toast('Produto desativado'); rProdutos(document.getElementById('pg'));

function saveP(){
  var cod=(document.getElementById('f-cod')?document.getElementById('f-cod').value:pForm.codigo).trim();
  var nome=(document.getElementById('f-nome')?document.getElementById('f-nome').value:pForm.nome).trim();
  var preco=document.getElementById('f-preco')?document.getElementById('f-preco').value:pForm.preco;
  var meta=document.getElementById('f-meta')?document.getElementById('f-meta').value:pForm.meta;
  var unidade=pForm.unidade||'kg';
  if(!cod||!nome){ toast('Código e nome são obrigatórios',true); return; }
  if(cod.length>20){ toast('Código máx 20 chars',true); return; }
  var dup=ST.prods.filter(function(p){ return p.codigo===cod&&p.ativo!==false&&p.id!==( pEd?pEd.id:null); })[0];
  if(dup){ toast('Código já existe',true); return; }
  if(pEd){
    ST.prods=ST.prods.map(function(p){ return p.id===pEd.id?Object.assign({},p,{codigo:cod,nome:nome,preco:preco,meta:meta,unidade:unidade}):p; });
    toast('Produto atualizado');
  } else {
    ST.prods.push({id:uid(),codigo:cod,nome:nome,preco:preco,meta:meta,unidade:unidade,ativo:true,crAt:new Date().toISOString()});
    toast('Produto cadastrado');
  }
  sProds(); pMod=null; rProdutos(document.getElementById('pg'));
}
function handleNF(input){
  var file=input.files[0]; if(!file) return;
  nfLoad=true; nfPre=false; rProdutos(document.getElementById('pg'));
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'Nota fiscal FLV. Retorne APENAS JSON: {"codigo":"...","nome":"...","preco":0}. Só o JSON.'}
      ]}]})
    }).then(function(r){ return r.json(); }).then(function(d){
      var txt=(d.content||[]).filter(function(b){ return b.type==='text'; }).map(function(b){ return b.text; }).join('');
      // Extrai JSON de qualquer lugar no texto (mais robusto)
      var jsonMatch=txt.match(/\{[\s\S]*?\}/);
      var parsed=null;
      if(jsonMatch){ try{ parsed=JSON.parse(jsonMatch[0]); }catch(e){} }
      if(!parsed){ try{ parsed=JSON.parse(txt.replace(/```json|```/g,'').trim()); }catch(e){} }
      if(!parsed){ throw new Error('JSON não encontrado'); }
      pForm={codigo:String(parsed.codigo||''),nome:parsed.nome||'',preco:String(parsed.preco||''),meta:'5',unidade:'kg'};
      pEd=null; nfPre=true; nfLoad=false; pMod='form';
      input.value=''; rProdutos(document.getElementById('pg'));
    }).catch(function(){
      nfLoad=false; toast('Erro ao ler NF — hospede no GitHub/Netlify',true);
      input.value=''; rProdutos(document.getElementById('pg'));
    });
  };
  reader.readAsDataURL(file);
}

function cancelNova(){ ST.novaItems=null; ST.novaTab=0; navigate('home'); }

var _phT=null, _phS=false;
function openCam(f,s){ _phT=f; _phS=(s==='true'||s===true); document.getElementById('ph-cam').click(); }
function openGal(f,s){ _phT=f; _phS=(s==='true'||s===true); document.getElementById('ph-gal').click(); }
function handlePh(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement('canvas');
      var max=800, w=img.width, h=img.height;
      if(w>max||h>max){ var sc=max/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      var url=c.toDataURL('image/jpeg',0.72);
      var ph={id:uid(),url:url};
      var it=ST.novaItems[ST.novaTab];
      it[_phT]=_phS?[ph]:(it[_phT]||[]).concat([ph]);
      rNova(document.getElementById('pg'));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}
function remPh(f,idx){
  var it=ST.novaItems[ST.novaTab];
  it[f]=it[f].filter(function(_,i){ return i!==idx; });
  rNova(document.getElementById('pg'));
}
function valNova(){
  for(var i=0;i<ST.novaItems.length;i++){
    var it=ST.novaItems[i];
    if(!it.prodId){ toast('Selecione um produto em todos os itens',true); return false; }
    if(parseN(it.chegou)<=0){ toast('Qtde chegou deve ser > 0',true); return false; }
    if(it.quebra===''){ toast('Informe a quantidade de quebra',true); return false; }
  }
  return true;
}
function prevNova(){ if(!valNova()) return; rPreview(); }
function rPreview(){
  var txt=waText(ST.novaItems);

  ST.novaItems.forEach(function(it){
    (it.fProd||[]).forEach(function(p){ allPh.push(Object.assign({},p,{tipo:'Produto'})); });
    (it.fBal||[]).forEach(function(p){ allPh.push(Object.assign({},p,{tipo:'Balan\u00e7a'})); });
    (it.fEtq||[]).forEach(function(p){ allPh.push(Object.assign({},p,{tipo:'Etiqueta'})); });
  });
  var phH='';

    phH='<div class="lbl" style="margin-bottom:6px">Fotos ('+allPh.length+')</div><div class="pg" style="margin-bottom:14px">';

  el._txt=txt; el._allPh=allPh;
  document.body.appendChild(el);
}
function sendWA(){
  var m=document.querySelector('.mov');
  var txt=m&&m._txt?m._txt:waText(ST.novaItems);
  var allPh=m&&m._allPh?m._allPh:[];
  var enc=encodeURIComponent(txt);
  if(navigator.share){
    if(allPh.length){
      Promise.all(allPh.map(function(ph,i){
        return fetch(ph.url).then(function(r){ return r.blob(); }).then(function(b){ return new File([b],'foto_'+i+'.jpg',{type:b.type}); });
      })).then(function(files){
        navigator.share({text:txt,files:files}).catch(function(){
          window.open('https://wa.me/?text='+enc,'_blank');
          if(allPh.length) toast(allPh.length+' foto(s) \u2014 adicione manualmente no WhatsApp');
        });
      }).catch(function(){
        navigator.share({text:txt}).catch(function(){ window.open('https://wa.me/?text='+enc,'_blank'); });
      });
    } else {
      navigator.share({text:txt}).catch(function(){ window.open('https://wa.me/?text='+enc,'_blank'); });
    }
  } else {
    window.open('https://wa.me/?text='+enc,'_blank');
    if(allPh.length) toast(allPh.length+' foto(s) \u2014 adicione manualmente no WhatsApp');
  }
}
function cpyTxt(){
  var m=document.querySelector('.mov');
  var txt=m&&m._txt?m._txt:waText(ST.novaItems);
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ toast('Texto copiado!'); }).catch(function(){ toast('Erro ao copiar',true); }); }
  else toast('Erro ao copiar',true);
}
function finalizar(){
  var trat={id:uid(),items:JSON.parse(JSON.stringify(ST.novaItems)),status:'finalizada',txtWA:waText(ST.novaItems),at:new Date().toISOString()};
  DB.saveTrat(trat);
  var movs=document.querySelectorAll('.mov');
  for(var i=0;i<movs.length;i++) movs[i].remove();
  ST.novaItems=null; ST.novaTab=0;
  toast('\u2705 Tratativa salva com sucesso!');
  navigate('detalhe',trat.id);
}

// DASHBOARD — VENDAS, FLUIGS, PROJEÇÃO

var aiLoad=false, aiTxt='', metaEd='';

function rDash(pc){
  if(metaEd==='') metaEd=String(ST.cfg.meta);
  var meses=DB.meses().slice().sort().reverse();
  if(!ST.dashMes&&meses.length>0) ST.dashMes=meses[0];
  var mesSel=ST.dashMes||mesAtual();
  var meta=ST.cfg.meta;

  var trats=DB.tratsDeMes(mesSel);
  var fluigs=DB.fluigsDeMes(mesSel);
  var vendas=DB.vendasDeMes(mesSel);

  // Quebra em R$
  var rqBruto=trats.reduce(function(s,t){
    return s+(t.items||[]).reduce(function(a,i){
      var p=ST.prods.filter(function(x){ return x.id===i.prodId; })[0];
      return a+parseN(i.quebra)*parseN(p?p.preco:0);
    },0);
  },0);
  var rqFluig=fluigs.reduce(function(s,f){ return s+parseN(f.valor); },0);
  var rqLiq=Math.max(0,rqBruto-rqFluig);
  var totalVendas=vendas.reduce(function(s,v){ return s+parseN(v.valor); },0);
  var pctBruto=totalVendas>0?(rqBruto/totalVendas*100):0;
  var pctLiq=totalVendas>0?(rqLiq/totalVendas*100):0;
  var temDados=totalVendas>0;

  // Projeção
  var hoje=new Date();
  var anoMes=mesSel.split('-');
  var diasNoMes=new Date(parseInt(anoMes[0]),parseInt(anoMes[1]),0).getDate();
  var diaAtual=mesSel===mesAtual()?hoje.getDate():diasNoMes;
  var ritmoV=totalVendas>0&&diaAtual>0?totalVendas/diaAtual:0;
  var ritmoQ=rqLiq>0&&diaAtual>0?rqLiq/diaAtual:0;
  var vendaProj=ritmoV*diasNoMes;
  var quebraProj=ritmoQ*diasNoMes;
  var pctProj=vendaProj>0?(quebraProj/vendaProj*100):0;
  var limiteProj=vendaProj>0?(vendaProj*meta/100)-rqLiq:0;

  // Situação
  var sitClass, sitEmoji, sitMsg;
  if(!temDados){
    sitClass='sit-card" style="background:linear-gradient(135deg,rgba(212,160,23,.1),rgba(212,160,23,.05));border:2px solid var(--yel)';
    sitEmoji='📊'; sitMsg='Informe as vendas abaixo para calcular';
  } else if(pctLiq<=meta){
    sitClass='sit-card" style="background:linear-gradient(135deg,rgba(45,122,45,.15),rgba(45,122,45,.05));border:2px solid var(--ok)';
    sitEmoji='✅'; sitMsg='BOM — Dentro da Meta ('+meta+'%)';
  } else {
    sitClass='sit-card" style="background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(192,57,43,.05));border:2px solid var(--red)';
    sitEmoji='🔴'; sitMsg='ALERTA — Acima da Meta ('+meta+'%)';
  }
  var sitColor=!temDados?'var(--yel)':pctLiq<=meta?'var(--ok)':'var(--red)';

  // Seletor de meses
  var monH='';
  if(meses.length>0){
    monH='<div class="ms">';
    meses.forEach(function(m){ monH+='<button class="mb '+(mesSel===m?'a':'')+'" onclick="ST.dashMes=\''+m+'\';rDash(document.getElementById(\'pg\'))">'+mesBR(m)+'</button>'; });
    monH+='</div>';
  }

  // Top produtos
  var pm={};
  trats.forEach(function(t){
    (t.items||[]).forEach(function(it){
      var p=ST.prods.filter(function(x){ return x.id===it.prodId; })[0]; if(!p) return;
      if(!pm[p.id]) pm[p.id]={nome:p.nome,kg:0,rs:0};
      pm[p.id].kg+=parseN(it.quebra);
      pm[p.id].rs+=parseN(it.quebra)*parseN(p.preco||0);
    });
  });
  var top=Object.values(pm).sort(function(a,b){ return b.rs-a.rs; }).slice(0,8);
  var mx=top.length?top[0].rs:1;
  var barsH='';
  if(top.length===0){
    barsH='<div style="padding:16px;text-align:center;color:var(--mut);font-size:12px">Sem dados em '+mesBR(mesSel)+'</div>';
  } else {
    barsH='<div class="bch">';
    top.forEach(function(p){
      var w=p.rs/mx*100;
      var valH=w>30?'<span class="bfv">R$'+numBR0(p.rs)+'</span>':'';
      var outH=w<=30?'<span class="bvo">R$'+numBR0(p.rs)+'</span>':'';
      barsH+='<div class="br"><span class="blbl" title="'+esc(p.nome)+'">'+esc(p.nome)+'</span><div class="btr"><div class="bfi" style="width:'+w+'%">'+valH+'</div></div>'+outH+'</div>';
    });
    barsH+='</div>';
  }

  // Fluigs
  var fluigH='';
  if(fluigs.length===0){
    fluigH='<div style="padding:12px;font-size:12px;color:var(--mut);text-align:center">Nenhum fluig em '+mesBR(mesSel)+'</div>';
  } else {
    fluigs.forEach(function(f){
      var dt=f.data?new Date(f.data+'T12:00').toLocaleDateString('pt-BR'):'';
      fluigH+='<div class="fluig-item"><div><div style="font-size:12px;font-weight:700">'+esc(f.obs||'Fluig aprovado')+'</div><div style="font-size:11px;color:var(--mut)">'+dt+'</div></div><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:13px;color:var(--ok);font-weight:700">+R$ '+numBR0(f.valor)+'</span><button class="btn btn-d btn-sm" onclick="delFluig(\''+f.id+'\',\''+mesSel+'\')">'+ic('tr',12)+'</button></div></div>';
    });
  }

  // Vendas recentes
  var vendasH='';
  if(vendas.length>0){
    vendasH='<div style="margin-top:10px">';
    var ultimas=vendas.slice(-3).reverse();
    ultimas.forEach(function(v){
      vendasH+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--brd2);font-size:11px"><span>'+new Date(v.data+'T12:00').toLocaleDateString('pt-BR')+'</span><span class="mono" style="color:var(--gm)">R$ '+numBR0(v.valor)+'</span></div>';
    });
    vendasH+='</div>';
  }

  // Projeção card
  var projH='';
  if(temDados){
    var limiteTxt='';
    if(limiteProj>0){
      limiteTxt='<div style="background:rgba(45,122,45,.08);border:1px solid var(--ok);border-radius:10px;padding:10px;text-align:center;margin-top:10px"><div class="lbl" style="color:var(--ok)">Ainda pode quebrar</div><div class="mono" style="font-size:20px;font-weight:700;color:var(--ok);margin-top:4px">R$ '+numBR0(limiteProj)+'</div><div style="font-size:10px;color:var(--mut);margin-top:2px">para fechar dentro da meta de '+meta+'%</div></div>';
    } else {
      limiteTxt='<div style="background:rgba(192,57,43,.08);border:1px solid var(--red);border-radius:10px;padding:10px;text-align:center;margin-top:10px"><div class="lbl" style="color:var(--red)">Meta ultrapassada em</div><div class="mono" style="font-size:20px;font-weight:700;color:var(--red);margin-top:4px">R$ '+numBR0(Math.abs(limiteProj))+'</div><div style="font-size:10px;color:var(--mut);margin-top:2px">já estourou o limite da meta de '+meta+'%</div></div>';
    }
    var rAtualCol=pctLiq<=meta?'var(--ok)':'var(--red)';
    var rProjCol=pctProj<=meta?'var(--ok)':'var(--red)';
    projH='<div class="bf" style="padding:14px;margin-bottom:14px"><div class="lbl" style="margin-bottom:10px">📈 Projeção — '+mesBR(mesSel)+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div style="background:var(--bg2);border-radius:10px;padding:10px;text-align:center"><div class="lbl">Ritmo Atual</div><div class="mono" style="font-size:18px;font-weight:700;color:'+rAtualCol+';margin-top:4px">'+numBR2(pctLiq)+'%</div><div style="font-size:10px;color:var(--mut);margin-top:2px">até dia '+diaAtual+'</div></div><div style="background:var(--bg2);border-radius:10px;padding:10px;text-align:center"><div class="lbl">Projeção Final</div><div class="mono" style="font-size:18px;font-weight:700;color:'+rProjCol+';margin-top:4px">'+numBR2(pctProj)+'%</div><div style="font-size:10px;color:var(--mut);margin-top:2px">se continuar assim</div></div></div>'+limiteTxt+'</div>';
  }

  var aiH='';
  if(aiLoad) aiH='<div style="text-align:center;padding:20px"><div class="spin" style="margin:0 auto 12px;width:28px;height:28px;border-width:3px"></div><div class="sub" style="font-size:12px">Analisando...</div></div>';
  else if(aiTxt) aiH='<div class="aic"><div class="lbl" style="margin-bottom:8px;color:var(--gm)">Análise · IA</div><div style="font-size:13px;line-height:1.65;white-space:pre-wrap">'+esc(aiTxt)+'</div></div>';

  pc.innerHTML=
    '<div class="ttl" style="margin-bottom:12px">Dashboard</div>'+
    monH+
    // SITUAÇÃO
    '<div class="'+sitClass+'">'+
      '<span class="sit-emoji">'+sitEmoji+'</span>'+
      '<div class="sit-pct" style="color:'+sitColor+'">'+(temDados?numBR2(pctLiq)+'%':'—')+'</div>'+
      '<div class="sit-lbl" style="color:'+sitColor+'">'+sitMsg+'</div>'+
      (temDados?'<div style="font-size:11px;color:var(--mut);margin-top:6px">Quebra Líquida (bruta - fluig)</div>':'')+'</div>'+
    // 4 MÉTRICAS
    '<div class="mg">'+
      '<div class="bf mc"><span class="lbl">Vendas Inf.</span><span class="mv" style="font-size:16px">R$ '+numBR0(totalVendas)+'</span><span style="font-size:10px;color:var(--mut)">'+vendas.length+' dia(s)</span></div>'+
      '<div class="bf mc"><span class="lbl">Quebra Bruta</span><span class="mv '+(temDados?pctClr(pctBruto,meta):'')+'" style="font-size:16px">R$ '+numBR0(rqBruto)+'</span><span style="font-size:10px;color:var(--mut)">'+(temDados?numBR2(pctBruto)+'%':'sem vendas')+'</span></div>'+
      '<div class="bf mc"><span class="lbl">Fluig Aprov.</span><span class="mv ok" style="font-size:16px">R$ '+numBR0(rqFluig)+'</span><span style="font-size:10px;color:var(--mut)">'+fluigs.length+' fluig(s)</span></div>'+
      '<div class="bf mc"><span class="lbl">Quebra Líq.</span><span class="mv '+(temDados?pctClr(pctLiq,meta):'')+'" style="font-size:16px">R$ '+numBR0(rqLiq)+'</span><span style="font-size:10px;color:var(--mut)">'+(temDados?numBR2(pctLiq)+'%':'sem vendas')+'</span></div>'+
    '</div>'+
    projH+
    // INFORMAR VENDAS
    '<div class="bf" style="padding:14px;margin-bottom:14px">'+
      '<div class="lbl" style="margin-bottom:8px">💰 Informar Vendas do Dia</div>'+
      '<div style="display:flex;gap:8px;align-items:flex-end">'+
        '<div style="flex:1"><label class="lbl" style="display:block;margin-bottom:4px">Data</label><input class="inp" type="date" id="vd-data" value="'+todayISO()+'" max="'+todayISO()+'"/></div>'+
        '<div style="flex:1"><label class="lbl" style="display:block;margin-bottom:4px">Vendas FLV (R$)</label><input class="inp inp-n" type="number" step="0.01" min="0" id="vd-valor" placeholder="Ex: 8500"/></div>'+
        '<button class="btn btn-p" onclick="saveVenda()">OK</button>'+
      '</div>'+
      vendasH+
    '</div>'+
    // FLUIGS
    '<div class="bf" style="margin-bottom:14px">'+
      '<div style="padding:14px 14px 10px">'+
        '<div class="lbl" style="margin-bottom:8px">📋 Registrar Fluig Aprovado</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
          '<div><label class="lbl" style="display:block;margin-bottom:4px">Data aprovação</label><input class="inp" type="date" id="fg-data" value="'+todayISO()+'" max="'+todayISO()+'"/></div>'+
          '<div><label class="lbl" style="display:block;margin-bottom:4px">Valor aprovado R$</label><input class="inp inp-n" type="number" step="0.01" min="0" id="fg-valor" placeholder="Ex: 500"/></div>'+
        '</div>'+
        '<div style="margin-bottom:8px"><label class="lbl" style="display:block;margin-bottom:4px">Observação (produto)</label><input class="inp" id="fg-obs" placeholder="Ex: Tomate — tratativa 17/04" maxlength="100"/></div>'+
        '<button class="btn btn-p btn-f" onclick="saveFluig()">'+ic('chk',15)+' Registrar Fluig</button>'+
      '</div>'+
      fluigH+
    '</div>'+
    // TOP PRODUTOS
    '<div class="bf" style="padding:12px;margin-bottom:14px"><div class="lbl" style="margin-bottom:10px">Top Produtos · Quebra em R$</div>'+barsH+'</div>'+
    // META
    '<div class="bf" style="padding:12px;margin-bottom:14px"><div class="lbl" style="margin-bottom:8px">⚙️ Meta Mensal — Aguas Lindas FLV</div><div style="display:flex;gap:8px;align-items:flex-end"><div style="flex:1"><label class="lbl" style="display:block;margin-bottom:4px">% Meta de Quebra</label><input class="inp inp-n" type="number" step="0.1" min="0" max="100" id="meta-inp" value="'+metaEd+'" oninput="metaEd=this.value"/></div><button class="btn btn-p" onclick="saveMeta()">Salvar</button></div><div style="font-size:11px;color:var(--mut);margin-top:6px">Meta atual: <strong>'+meta+'%</strong></div></div>'+
    // IA
    '<button class="btn btn-g btn-f" style="margin-bottom:12px" onclick="doAI()" '+(aiLoad?'disabled':'')+'>'+( aiLoad?'<span class="spin"></span> Analisando...':ic('cpu',15)+' Analisar Padrões com IA')+'</button>'+
    aiH;
}

function saveVenda(){
  var data=document.getElementById('vd-data')?document.getElementById('vd-data').value:'';
  var valorEl=document.getElementById('vd-valor');
  var valor=valorEl?valorEl.value:'';
  if(!data||!valor||parseN(valor)<=0){ toast('Informe data e valor de vendas',true); return; }
  DB.saveVenda(data,parseN(valor));
  if(!ST.dashMes) ST.dashMes=data.slice(0,7);
  toast('\u2705 Vendas salvas!');
  if(valorEl) valorEl.value='';
  rDash(document.getElementById('pg'));
}
function saveFluig(){
  var data=document.getElementById('fg-data')?document.getElementById('fg-data').value:'';
  var valorEl=document.getElementById('fg-valor');
  var valor=valorEl?valorEl.value:'';
  var obs=document.getElementById('fg-obs')?document.getElementById('fg-obs').value:'Fluig aprovado';
  if(!data||!valor||parseN(valor)<=0){ toast('Informe data e valor do fluig',true); return; }
  DB.saveFluig({id:uid(),data:data,valor:parseN(valor),obs:obs||'Fluig aprovado'});
  if(!ST.dashMes) ST.dashMes=data.slice(0,7);
  toast('\u2705 Fluig registrado \u2014 abate aplicado!');
  if(valorEl) valorEl.value='';
  rDash(document.getElementById('pg'));
}
function delFluig(id,mes){ DB.delFluig(id,mes); toast('Fluig removido'); rDash(document.getElementById('pg')); }
function saveMeta(){ ST.cfg.meta=parseFloat(metaEd)||3.5; sCfg(); toast('Meta salva'); rDash(document.getElementById('pg')); }

function doAI(){
  var todas=DB.todasTrats();
  if(!todas.length){ toast('Nenhum dado para analisar',true); return; }
  aiLoad=true; aiTxt=''; rDash(document.getElementById('pg'));
  var data=todas.slice(-30).map(function(t){
    return {
      data:new Date(t.at).toLocaleDateString('pt-BR'),
      produtos:(t.items||[]).map(function(it){
        var p=ST.prods.filter(function(x){ return x.id===it.prodId; })[0];
        var q=parseN(it.quebra),c=parseN(it.chegou);
        return {cod:p?p.codigo:'',nome:p?p.nome:'',quebra:q,chegou:c,pct:c>0?(q/c*100).toFixed(1):0};
      })
    };
  });
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,
      messages:[{role:'user',content:'Especialista em gest\u00e3o FLV. Analise dados de quebra e forne\u00e7a insights ACION\u00c1VEIS em portugu\u00eas. 1) Produtos com quebra alta/recorrente, 2) Padr\u00f5es temporais, 3) A\u00e7\u00f5es preventivas com n\u00fameros. M\u00e1x 260 palavras.\n\n'+JSON.stringify(data,null,2)}]})
  }).then(function(r){ return r.json(); }).then(function(d){
    var blocks=d.content||[];
    aiTxt=blocks.filter(function(b){ return b.type==='text'; }).map(function(b){ return b.text; }).join('');
    if(!aiTxt) aiTxt='Sem resposta.';
    aiLoad=false; rDash(document.getElementById('pg'));
  }).catch(function(){
    aiTxt='Erro \u2014 hospede o app no GitHub Pages para usar a IA.';
    aiLoad=false; rDash(document.getElementById('pg'));
  });
}

// HISTÓRICO
// ════════════════════════════════════════════════════
var hSrch='', hFrom='', hTo='';
function rHist(pc){
  var meses=DB.meses().slice().sort().reverse();
  if(!ST.histMes&&meses.length>0) ST.histMes=meses[0];
  var mesSel=ST.histMes||mesAtual();
  var monH='';
  if(meses.length===0){
    monH='<div style="padding:16px;text-align:center;color:var(--mut);font-size:12px">Nenhuma tratativa registrada ainda</div>';
  } else {
    monH='<div class="ms">';
    meses.forEach(function(m){ monH+='<button class="mb '+(mesSel===m?'a':'')+'" onclick="ST.histMes=\''+m+'\';hSrch=\'\';hFrom=\'\';hTo=\'\';rHist(document.getElementById(\'pg\'))">'+mesBR(m)+'</button>'; });
    monH+='</div>';
  }
  var trats=DB.tratsDeMes(mesSel).slice().sort(function(a,b){ return a.at>b.at?-1:1; });
  var filt=trats.filter(function(t){
    var ok=!hSrch||(t.items||[]).some(function(it){
      var p=ST.prods.filter(function(x){ return x.id===it.prodId; })[0];
      return p&&(p.codigo.toLowerCase().indexOf(hSrch.toLowerCase())>=0||p.nome.toLowerCase().indexOf(hSrch.toLowerCase())>=0);
    });
    var d=new Date(t.at);
    return ok&&(!hFrom||d>=new Date(hFrom))&&(!hTo||d<=new Date(hTo+'T23:59:59'));
  });
  var listH='';
  if(filt.length===0){
    listH='<div style="padding:24px;text-align:center;color:var(--mut)">'+ic('list',28,'var(--mut)')+'<div style="margin-top:8px;font-size:12px;font-weight:600">Nenhuma tratativa em '+mesBR(mesSel)+'</div></div>';
  } else {
    filt.forEach(function(t){
      var kgT=(t.items||[]).reduce(function(s,i){ return s+parseN(i.quebra); },0);
      var cT=(t.items||[]).reduce(function(s,i){ return s+parseN(i.chegou); },0);
      var p2=cT>0?(kgT/cT*100).toFixed(1):0;
      var codes=(t.items||[]).map(function(i){ var p=ST.prods.filter(function(x){ return x.id===i.prodId; })[0]; return p?p.codigo:null; }).filter(Boolean);
      var nFotos=DB.keys().filter(function(k){ return k.indexOf('flv_ph_'+t.id)===0; }).length;
      var fotosTxt=nFotos>0?'<div style="font-size:10px;color:var(--mut);margin-top:1px">📷 '+nFotos+' foto(s) salva(s)</div>':'';
      var dt=new Date(t.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
      listH+='<div class="li" onclick="navigate(\'detalhe\',\''+t.id+'\')"><div class="cr"><div><div style="font-size:11px;color:var(--mut);margin-bottom:1px">'+dt+'</div><div style="font-size:12px;font-weight:700">'+esc(codes.join(' \u00b7 ')||'\u2014')+'</div>'+fotosTxt+'</div><div style="text-align:right"><div class="mono" style="font-size:13px;color:var(--gm);font-weight:600">'+numBR(kgT)+' kg</div><div style="font-size:10px;color:var(--mut)">'+p2+'%</div></div></div></div>';
    });
  }
  pc.innerHTML=
    '<div class="ttl" style="margin-bottom:12px">Histórico</div>'+
    monH+
    '<div class="fg"><input class="inp" placeholder="Buscar código ou produto..." value="'+esc(hSrch)+'" oninput="hSrch=this.value;rHist(document.getElementById(\'pg\'))"/></div>'+
    '<div class="g2" style="margin-bottom:8px"><div><label class="lbl" style="display:block;margin-bottom:4px">De</label><input class="inp" type="date" value="'+hFrom+'" onchange="hFrom=this.value;rHist(document.getElementById(\'pg\'))"/></div><div><label class="lbl" style="display:block;margin-bottom:4px">Até</label><input class="inp" type="date" value="'+hTo+'" onchange="hTo=this.value;rHist(document.getElementById(\'pg\'))"/></div></div>'+
    '<div style="font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:700">'+filt.length+' tratativa(s) · '+mesBR(mesSel)+'</div>'+
    '<div class="bf">'+listH+'</div>';
}

function rDet(pc,id){
  var t=DB.loadTrat(id);
  if(!t){ pc.innerHTML='<div style="padding:20px;color:var(--mut)">Tratativa não encontrada.</div>'; return; }
  var txt=t.txtWA||waText(t.items||[]);
  var allPh=[];
  (t.items||[]).forEach(function(it){
    (it.fProd||[]).forEach(function(p){ if(p.url) allPh.push({url:p.url,tipo:'Produto'}); });
    (it.fBal||[]).forEach(function(p){ if(p.url) allPh.push({url:p.url,tipo:'Balan\u00e7a'}); });
    (it.fEtq||[]).forEach(function(p){ if(p.url) allPh.push({url:p.url,tipo:'Etiqueta'}); });
  });
  var phH='';
  if(allPh.length){
    phH='<div class="lbl" style="margin-bottom:6px">Fotos salvas ('+allPh.length+')</div><div class="pg" style="margin-bottom:14px">';
    allPh.forEach(function(ph){ phH+='<div class="pt"><img src="'+ph.url+'" alt="'+ph.tipo+'"/><div class="plbl">'+ph.tipo+'</div></div>'; });
    phH+='</div>';
  } else {
    phH='<div style="padding:12px;background:var(--bg2);border-radius:10px;font-size:12px;color:var(--mut);margin-bottom:14px;font-weight:600">Nenhuma foto salva nesta tratativa</div>';
  }
  var itensH='';
  (t.items||[]).forEach(function(it){
    var p=ST.prods.filter(function(x){ return x.id===it.prodId; })[0];
    var ch2=parseN(it.chegou), qb2=parseN(it.quebra);
    var p2=ch2>0?(qb2/ch2*100).toFixed(1):0;
    itensH+='<div class="li"><div class="mono" style="font-size:11px;color:var(--gm);font-weight:600">'+esc(p?p.codigo:'\u2014')+'</div><div style="font-size:13px">'+esc(p?p.nome:'\u2014')+'</div><div style="font-size:11px;color:var(--mut);margin-top:2px">Chegou: '+numBR(ch2)+' '+(p?(p.unidade||'kg'):'kg')+' · Quebra: '+numBR(qb2)+' '+(p?(p.unidade||'kg'):'kg')+' · '+p2+'%</div></div>';
  });
  pc.innerHTML=
    '<div class="cr" style="margin-bottom:14px"><button class="btn btn-g btn-sm" onclick="navigate(\'historico\')">'+ic('bk',15)+'</button><div class="sub" style="flex:1;text-align:center">Detalhe</div><span class="bdg '+(t.status==='finalizada'?'bok':'bw')+'">'+esc(t.status||'\u2014')+'</span></div>'+
    '<div style="font-size:11px;color:var(--mut);margin-bottom:12px">'+new Date(t.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</div>'+
    '<div class="lbl" style="margin-bottom:6px">Texto WhatsApp</div>'+
    '<div class="wab" style="margin-bottom:12px">'+esc(txt)+'</div>'+
    '<div class="lbl" style="margin-bottom:8px">Fotos</div>'+
    phH+
    '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+
      '<button class="btn btn-wa btn-f" onclick="dtWA(\''+id+'\')">'+ic('wa',17)+' Reenviar para WhatsApp</button>'+
      '<button class="btn btn-g btn-f" onclick="dtCpy(\''+id+'\')">'+ic('cpy',15)+' Copiar Texto</button>'+
      '<button class="btn btn-g btn-f" onclick="navigate(\'historico\')">'+ic('bk',15)+' Voltar ao Histórico</button>'+
    '</div>'+
    (itensH?'<div class="sh"><span class="lbl">Itens</span><div class="shl"></div></div><div class="bf">'+itensH+'</div>':'');
}
function dtWA(id){
  var t=DB.loadTrat(id); if(!t) return;
  var txt=t.txtWA||waText(t.items||[]);
  var allPh=[];
  (t.items||[]).forEach(function(it){
    (it.fProd||[]).filter(function(p){ return p.url; }).forEach(function(p){ allPh.push(p); });
    (it.fBal||[]).filter(function(p){ return p.url; }).forEach(function(p){ allPh.push(p); });
    (it.fEtq||[]).filter(function(p){ return p.url; }).forEach(function(p){ allPh.push(p); });
  });
  var enc=encodeURIComponent(txt);
  if(navigator.share){
    if(allPh.length){
      Promise.all(allPh.map(function(ph,i){ return fetch(ph.url).then(function(r){ return r.blob(); }).then(function(b){ return new File([b],'foto_'+i+'.jpg',{type:b.type}); }); }))
      .then(function(files){ navigator.share({text:txt,files:files}).catch(function(){ window.open('https://wa.me/?text='+enc,'_blank'); }); })
      .catch(function(){ navigator.share({text:txt}).catch(function(){ window.open('https://wa.me/?text='+enc,'_blank'); }); });
    } else {
      navigator.share({text:txt}).catch(function(){ window.open('https://wa.me/?text='+enc,'_blank'); });
    }
  } else {
    window.open('https://wa.me/?text='+enc,'_blank');
    if(allPh.length) toast(allPh.length+' foto(s) \u2014 adicione manualmente');
  }
}
function dtCpy(id){
  var t=DB.loadTrat(id); if(!t) return;
  if(navigator.clipboard){ navigator.clipboard.writeText(t.txtWA||waText(t.items||[])).then(function(){ toast('Copiado!'); }).catch(function(){ toast('Erro',true); }); }
}

  var sw="const C='flv-v4';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));";
  try{ navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){}); }catch(e){}
}

// ════════════════════════════════════════════════════
// SPLASH SCREEN — canvas hortifruti
// ════════════════════════════════════════════════════
function drawSplash(){
  var canvas=document.getElementById('splash-canvas');
  if(!canvas) return;
  var W=canvas.offsetWidth, H=canvas.offsetHeight;
  canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');

  // Fundo gradiente verde escuro
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d3010');
  bg.addColorStop(0.5,'#0a2a0a');
  bg.addColorStop(1,'#061406');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Função para desenhar vegetal estilizado
  function circle(x,y,r,col,alpha){
    ctx.save(); ctx.globalAlpha=alpha||1;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill(); ctx.restore();
  }
  function ellipse(x,y,rx,ry,rot,col,alpha){
    ctx.save(); ctx.globalAlpha=alpha||1;
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,rot||0,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill(); ctx.restore();
  }

  // Grade de vegetais coloridos no fundo
  var vegs=[
    // Tomates
    {x:W*.08,y:H*.06,r:28,col:'#c0392b',s:'tom'},
    {x:W*.22,y:H*.12,r:24,col:'#e74c3c',s:'tom'},
    {x:W*.75,y:H*.05,r:30,col:'#c0392b',s:'tom'},
    {x:W*.91,y:H*.14,r:22,col:'#e74c3c',s:'tom'},
    {x:W*.55,y:H*.08,r:26,col:'#c0392b',s:'tom'},
    // Pimentões verdes
    {x:W*.38,y:H*.07,r:20,col:'#27ae60',s:'pip'},
    {x:W*.65,y:H*.17,r:22,col:'#2ecc71',s:'pip'},
    {x:W*.14,y:H*.22,r:18,col:'#1e8449',s:'pip'},
    // Melancias
    {x:W*.85,y:H*.28,r:35,col:'#2ecc71',s:'mel'},
    {x:W*.05,y:H*.35,r:32,col:'#27ae60',s:'mel'},
    // Berinjelas
    {x:W*.48,y:H*.21,r:18,col:'#6c3483',s:'ber'},
    {x:W*.78,y:H*.38,r:22,col:'#7d3c98',s:'ber'},
    {x:W*.18,y:H*.44,r:16,col:'#5b2c6f',s:'ber'},
    // Laranjas/limões
    {x:W*.32,y:H*.31,r:20,col:'#e67e22',s:'lar'},
    {x:W*.62,y:H*.33,r:18,col:'#f39c12',s:'lar'},
    {x:W*.88,y:H*.48,r:16,col:'#f1c40f',s:'lim'},
    {x:W*.42,y:H*.42,r:14,col:'#d4ac0d',s:'lim'},
    // Brócolis/couve
    {x:W*.25,y:H*.48,r:24,col:'#1a5e2a',s:'bro'},
    {x:W*.70,y:H*.52,r:20,col:'#145a32',s:'bro'},
    // Cebolas
    {x:W*.50,y:H*.52,r:18,col:'#d35400',s:'ceb'},
    {x:W*.08,y:H*.52,r:16,col:'#ca6f1e',s:'ceb'},
    // Pepinos
    {x:W*.35,y:H*.55,r:12,col:'#1e8449',s:'pep'},
    {x:W*.80,y:H*.56,r:14,col:'#196f3d',s:'pep'},
  ];

  vegs.forEach(function(v){
    var alpha=0.7+Math.random()*0.25;
    circle(v.x,v.y,v.r,v.col,alpha);
    // Detalhe/brilho
    ctx.save(); ctx.globalAlpha=0.3;
    ctx.beginPath(); ctx.arc(v.x-v.r*.25,v.y-v.r*.25,v.r*.35,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill(); ctx.restore();
    // Detalhes por tipo
    if(v.s==='tom'){
      ctx.save(); ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.moveTo(v.x,v.y-v.r);
      ctx.bezierCurveTo(v.x+5,v.y-v.r-8,v.x+10,v.y-v.r-4,v.x+8,v.y-v.r+2);
      ctx.strokeStyle='#196f3d'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
    }
    if(v.s==='mel'){
      // Listras de melancia
      for(var i=0;i<4;i++){
        ctx.save(); ctx.globalAlpha=0.35;
        ctx.beginPath();
        ctx.arc(v.x,v.y,v.r*(0.6+i*.1),(Math.PI*0.1*i),(Math.PI*0.1*i+0.4));
        ctx.strokeStyle='#145a32'; ctx.lineWidth=3; ctx.stroke(); ctx.restore();
      }
    }
    if(v.s==='bro'){
      // Mini círculos para brócolis
      for(var j=0;j<5;j++){
        var bx=v.x+Math.cos(j*Math.PI*2/5)*v.r*.5;
        var by=v.y+Math.sin(j*Math.PI*2/5)*v.r*.5;
        circle(bx,by,v.r*.35,'#27ae60',0.6);
      }
    }
  });

  // Folhas espalhadas
  function leaf(x,y,size,angle,col){
    ctx.save(); ctx.globalAlpha=0.55;
    ctx.translate(x,y); ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(size*.5,-size*.6,size,-size*.2,size*.8,size*.3);
    ctx.bezierCurveTo(size*.4,size*.7,size*.1,size*.3,0,0);
    ctx.fillStyle=col||'#27ae60'; ctx.fill();
    ctx.restore();
  }
  var leafPositions=[
    [W*.15,H*.18,22,0.3],[W*.45,H*.15,18,-0.5],[W*.72,H*.22,20,0.8],
    [W*.30,H*.38,16,-0.3],[W*.60,H*.44,20,1.1],[W*.90,H*.35,18,-0.7],
    [W*.05,H*.48,14,0.5],[W*.55,H*.35,16,-1.0],[W*.82,H*.42,22,0.4],
  ];
  leafPositions.forEach(function(l){ leaf(l[0],l[1],l[2],l[3],'#27ae60'); });

  // Overlay gradiente escurecendo na parte de baixo
  var ov=ctx.createLinearGradient(0,H*.3,0,H);
  ov.addColorStop(0,'rgba(5,20,5,0)');
  ov.addColorStop(0.5,'rgba(5,20,5,0.55)');
  ov.addColorStop(1,'rgba(3,15,3,0.93)');
  ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);
}

function enterApp(){
  var splash=document.getElementById('splash');
  if(splash){
    splash.style.transition='opacity .4s ease';
    splash.style.opacity='0';
    setTimeout(function(){ splash.style.display='none'; },420);
  }
}

render();

setTimeout(drawSplash, 50);
