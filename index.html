<script>
// ════════════════════════════════════════════════════
// STORAGE ROBUSTO
// BUG CORRIGIDO: fotos salvas em chaves SEPARADAS
// para não estourar o limite de 5MB do localStorage
// ════════════════════════════════════════════════════
const DB={
  g(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  s(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}},
  del(k){try{localStorage.removeItem(k)}catch{}},
  keys(){try{return Object.keys(localStorage)}catch{return[]}},

  // Salva fotos comprimidas em chave própria
  savePh(tid,iidx,campo,arr){
    const key=`flv_ph_${tid}_${iidx}_${campo}`;
    if(!arr||!arr.length){this.del(key);return;}
    const ok=this.s(key,arr.map(p=>({id:p.id,url:p.url})));
    if(!ok){
      // Tenta comprimir mais
      const comp=arr.map(p=>{
        try{
          const c=document.createElement('canvas');
          const img=new Image();img.src=p.url;
          c.width=300;c.height=300;
          c.getContext('2d').drawImage(img,0,0,300,300);
          return{id:p.id,url:c.toDataURL('image/jpeg',0.4)};
        }catch{return{id:p.id,url:p.url};}
      });
      this.s(key,comp);
    }
  },
  loadPh(tid,iidx,campo){
    return this.g(`flv_ph_${tid}_${iidx}_${campo}`)||[];
  },

  // Salva tratativa SEM fotos (fotos em chaves separadas)
  saveTrat(t){
    const semF={
      ...t,
      items:(t.items||[]).map((it,idx)=>{
        this.savePh(t.id,idx,'fProd',it.fProd||[]);
        this.savePh(t.id,idx,'fBal',it.fBal||[]);
        this.savePh(t.id,idx,'fEtq',it.fEtq||[]);
        return{...it,
          fProd:(it.fProd||[]).map(p=>({id:p.id})),
          fBal:(it.fBal||[]).map(p=>({id:p.id})),
          fEtq:(it.fEtq||[]).map(p=>({id:p.id})),
        };
      })
    };
    // Índice por mês: flv_idx_YYYY-MM
    const mes=t.at.slice(0,7);
    let idx=this.g(`flv_idx_${mes}`)||[];
    if(!idx.includes(t.id))idx.push(t.id);
    this.s(`flv_idx_${mes}`,idx);
    this.s(`flv_t_${t.id}`,semF);
    // Lista de meses conhecidos
    let meses=this.g('flv_meses')||[];
    if(!meses.includes(mes))meses.push(mes);
    meses.sort();
    this.s('flv_meses',meses);
  },

  // Carrega tratativa COM fotos
  loadTrat(id){
    const t=this.g(`flv_t_${id}`);
    if(!t)return null;
    return{...t,
      items:(t.items||[]).map((it,idx)=>({
        ...it,
        fProd:this.loadPh(t.id,idx,'fProd'),
        fBal:this.loadPh(t.id,idx,'fBal'),
        fEtq:this.loadPh(t.id,idx,'fEtq'),
      }))
    };
  },

  // Tratativas de um mês (sem fotos — para listagem)
  idsDeMes(mes){return this.g(`flv_idx_${mes}`)||[]},
  tratsDeMes(mes){return this.idsDeMes(mes).map(id=>this.g(`flv_t_${id}`)).filter(Boolean)},
  todasTrats(){
    return(this.g('flv_meses')||[]).flatMap(m=>this.tratsDeMes(m)).sort((a,b)=>a.at<b.at?-1:1);
  },
  meses(){return this.g('flv_meses')||[]},
  espacoKB(){let t=0;try{for(let k in localStorage)t+=localStorage[k].length+k.length}catch{}return Math.round(t/1024)},
};

const todayISO=()=>new Date().toISOString().split('T')[0];
const todayBR=()=>new Date().toLocaleDateString('pt-BR');
const mesAtual=()=>new Date().toISOString().slice(0,7);
const mesBR=m=>{if(!m)return'';const[y,mo]=m.split('-');return['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(mo)-1]+'/'+y;};
const parseN=s=>parseFloat(String(s||0).replace(',','.'))||0;
const numBR=n=>parseFloat(n||0).toFixed(1).replace('.',',');
const numBR0=n=>Math.round(n||0);
const uid=()=>`${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pctClr=(p,m)=>p>m?'d':p>m*.7?'w':'ok';
function waText(items){
  return items.map(it=>{
    const p=ST.prods.find(x=>x.id===it.prodId);if(!p)return'';
    const dt=it.data?new Date(it.data+'T12:00').toLocaleDateString('pt-BR'):todayBR();
    const un=p.unidade||'kg';
    // Para unidade: exibe número inteiro sem decimal
    const fmtQtd=(v)=>un==='un'?String(Math.round(parseN(v))):numBR(v);
    return`Cód: ${p.codigo}\n${p.nome}\n${dt}\n chegou: ${fmtQtd(it.chegou)} ${un}\nQuantidade da quebra: ${fmtQtd(it.quebra)} ${un}`;
  }).filter(Boolean).join('\n\n');
}

function rHome(pc){
  const today=todayISO();
  const todayTs=DB.tratsDeMes(mesAtual()).filter(t=>t.at&&t.at.startsWith(today));
  const totalQ=todayTs.reduce((s,t)=>s+(t.items||[]).reduce((a,i)=>a+parseN(i.quebra),0),0);
  const totalC=todayTs.reduce((s,t)=>s+(t.items||[]).reduce((a,i)=>a+parseN(i.chegou),0),0);
  const pct=totalC>0?totalQ/totalC*100:0,meta=ST.cfg.meta,cl=pctClr(pct,meta);
  const kb=DB.espacoKB();
  const storWarn=kb>4000?`<div class="stor-warn">⚠ Armazenamento: ${kb}KB usado de ~5000KB. Fotos antigas podem não ser salvas.</div>`:'';
  const inst=ST.showInst?`<div class="ibanner">${ic('dl',20,'var(--gold)')}<div style="flex:1"><div class="sub" style="font-size:13px">Instalar App FLV</div><div style="font-size:11px;color:var(--mut)">Adicione à tela inicial para acesso rápido</div></div><button class="btn btn-p btn-sm" onclick="instApp()">Instalar</button><button class="cl" onclick="ST.showInst=false;render()">×</button></div>`:'';
  const mesTs=DB.tratsDeMes(mesAtual()).slice().sort((a,b)=>b.at>a.at?1:-1);
  const recent=mesTs.length===0
    ?`<div style="padding:24px;text-align:center;color:var(--mut)">${ic('list',28,'var(--mut)')}<div style="margin-top:8px;font-size:12px;font-weight:600">Nenhuma tratativa este mês</div></div>`
    :mesTs.slice(0,5).map(t=>{
      const codes=(t.items||[]).map(i=>ST.prods.find(p=>p.id===i.prodId)?.codigo).filter(Boolean);
      const kgT=(t.items||[]).reduce((s,i)=>s+parseN(i.quebra),0);
      return`<div class="li" onclick="navigate('detalhe',${JSON.stringify(t.id)})"><div class="cr">
        <div><div class="sub" style="font-size:12px">${esc(codes.join(' · '))||'—'}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:1px">${new Date(t.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div></div>
        <div style="text-align:right"><div class="mono" style="font-size:13px;color:var(--gm);font-weight:600">${numBR(kgT)} kg</div>
        <span class="bdg ${t.status==='finalizada'?'bok':'bw'}">${t.status||'rascunho'}</span></div>
      </div></div>`;
    }).join('');
  pc.innerHTML=`${storWarn}${inst}
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:var(--mut);font-weight:700">${todayBR()}</div>
      <div class="ttl" style="font-size:22px">Resumo do Dia 🌿</div>
    </div>
    <div class="mg">
      <div class="bf mc"><span class="lbl">Hoje</span><span class="mv">${todayTs.length}</span></div>
      <div class="bf mc"><span class="lbl">Quebra Total</span><span class="mv ${cl}">${numBR(totalQ)} kg</span></div>
      <div class="bf mc"><span class="lbl">% Quebra</span><span class="mv ${cl}">${pct.toFixed(1)}%</span></div>
      <div class="bf mc"><span class="lbl">Status</span><div style="margin-top:6px"><span class="bdg ${pct<=meta?'bok':'bd'}">${pct<=meta?'✓ OK':'⚠ Acima'}</span></div></div>
    </div>
    <div class="bf" style="padding:14px;margin-bottom:16px">
      <div class="cr" style="margin-bottom:8px">
        <span class="lbl">Meta ${meta}%</span>
        <span style="font-size:12px;font-weight:700;color:${pct>meta?'var(--red)':'var(--ok)'}">${pct.toFixed(1)}%</span>
      </div>
      <div class="pw" style="height:8px"><div class="pb" style="height:8px;width:${Math.min(pct/meta*100,100)}%;background:${pct>meta?'var(--red)':pct>meta*.7?'var(--yel)':'var(--ok)'}"></div></div>
    </div>
    <button class="btn btn-p btn-f" style="margin-bottom:16px;padding:14px" onclick="navigate('nova')">${ic('plus',18,'#fff')} Nova Tratativa</button>
    <div class="sh"><span class="lbl">Recentes — ${mesBR(mesAtual())}</span><div class="shl"></div></div>
    <div class="bf">${recent}</div>`;
}
async function instApp(){
  if(ST.instEvt){ST.instEvt.prompt();const r=await ST.instEvt.userChoice;if(r.outcome==='accepted'){ST.showInst=false;render();}}
  else toast('No Chrome: Menu ⋮ → Adicionar à tela inicial');
}

        </div>

        ${p.preco?`<div style="font-size:11px;color:var(--mut);margin-top:1px">R$ ${numBR(p.preco)}/kg</div>`:''}
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn btn-g btn-sm" onclick="editP(${JSON.stringify(p.id)})">${ic('ed',13)}</button>

      <div class="mhd"></div>

      <div class="fg"><label class="lbl">Nome *</label><input class="inp" id="f-nome" maxlength="200" placeholder="Ex: Tomate" value="${esc(pForm.nome)}" oninput="pForm.nome=this.value"/></div>
      <div class="fg"><label class="lbl">Unidade de Medida *</label>
        <div style="display:flex;gap:8px">
          <button id="un-kg" class="btn btn-f ${(pForm.unidade||'kg')==='kg'?'btn-p':'btn-g'}" onclick="pForm.unidade='kg';document.getElementById('un-kg').className='btn btn-f btn-p';document.getElementById('un-un').className='btn btn-f btn-g';document.getElementById('f-preco-lbl').textContent='Preço/kg (R$)'">⚖️ kg</button>

      </div>
      <div class="fg"><label class="lbl" id="f-preco-lbl">Preço/${(pForm.unidade||'kg')==='un'?'un':'kg'} (R$)</label><input class="inp inp-n" id="f-preco" type="number" step="0.01" min="0" placeholder="3.50" value="${esc(pForm.preco)}" oninput="pForm.preco=this.value"/></div>
      <div class="fg"><label class="lbl">Meta Quebra (%)</label><input class="inp inp-n" id="f-meta" type="number" step="0.1" min="0" max="100" placeholder="5" value="${esc(pForm.meta)}" oninput="pForm.meta=this.value"/></div>

      </div>

  const nfMod=`<div id="nf-modal" class="mov hidden" onclick="if(event.target===this)this.classList.add('hidden')">

        <button class="btn btn-g btn-f" onclick="document.getElementById('nf-modal').classList.add('hidden');document.getElementById('nf-gal').click()">${ic('gal',17)} Escolher da Galeria</button>

  const nfL=nfLoad?`<div class="mov"><div class="modal" style="text-align:center;padding:40px"><div class="spin" style="margin:0 auto 16px;width:32px;height:32px;border-width:3px"></div><div class="sub">Lendo Nota Fiscal</div><div style="font-size:12px;color:var(--mut);margin-top:8px">A IA está identificando o produto...</div></div></div>`:'';

function showNFM(){const m=document.getElementById('nf-modal');if(m)m.classList.remove('hidden');}
function openNP(){pForm={codigo:'',nome:'',preco:'',meta:'5',unidade:'kg'};pEd=null;pMod='form';nfPre=false;rProdutos(document.getElementById('pg'));}
function editP(id){const p=ST.prods.find(x=>x.id===id);if(!p)return;pEd=p;pForm={codigo:p.codigo||'',nome:p.nome||'',preco:String(p.preco||''),meta:String(p.meta||'5'),unidade:p.unidade||'kg'};pMod='form';nfPre=false;rProdutos(document.getElementById('pg'));}
function delP(id){ST.prods=ST.prods.map(p=>p.id===id?{...p,ativo:false}:p);sProds();toast('Produto desativado');rProdutos(document.getElementById('pg'));}
function saveP(){
  const cod=(document.getElementById('f-cod')?.value||pForm.codigo).trim();
  const nome=(document.getElementById('f-nome')?.value||pForm.nome).trim();
  const preco=document.getElementById('f-preco')?.value||pForm.preco;
  const meta=document.getElementById('f-meta')?.value||pForm.meta;
  const unidade=pForm.unidade||'kg';
  if(!cod||!nome){toast('Código e nome são obrigatórios',true);return;}
  if(cod.length>20){toast('Código máx 20 chars',true);return;}
  if(ST.prods.find(p=>p.codigo===cod&&p.ativo!==false&&p.id!==pEd?.id)){toast('Código já existe',true);return;}
  if(pEd){ST.prods=ST.prods.map(p=>p.id===pEd.id?{...p,codigo:cod,nome,preco,meta,unidade}:p);toast('Produto atualizado');}

  });
  const list=filt.length===0
    ?`<div style="padding:24px;text-align:center;color:var(--mut)">${ic('list',28,'var(--mut)')}<div style="margin-top:8px;font-size:12px;font-weight:600">Nenhuma tratativa em ${mesBR(mesSel)}</div></div>`
    :filt.map(t=>{
      const kgT=(t.items||[]).reduce((s,i)=>s+parseN(i.quebra),0);
      const cT=(t.items||[]).reduce((s,i)=>s+parseN(i.chegou),0);
      const p2=cT>0?(kgT/cT*100).toFixed(1):0;
      const codes=(t.items||[]).map(i=>ST.prods.find(x=>x.id===i.prodId)?.codigo).filter(Boolean);
      const nFotos=DB.keys().filter(k=>k.startsWith(`flv_ph_${t.id}`)).length;
      return`<div class="li" onclick="navigate('detalhe',${JSON.stringify(t.id)})"><div class="cr">
        <div>
          <div style="font-size:11px;color:var(--mut);margin-bottom:1px">${new Date(t.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
          <div style="font-size:12px;font-weight:700">${esc(codes.join(' · '))||'—'}</div>
          ${nFotos>0?`<div style="font-size:10px;color:var(--mut);margin-top:1px">📷 ${nFotos} foto(s) salva(s)</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:13px;color:var(--gm);font-weight:600">${numBR(kgT)} kg</div>
          <div style="font-size:10px;color:var(--mut)">${p2}%</div>
        </div>
      </div></div>`;
    }).join('');
  pc.innerHTML=`
    <div class="ttl" style="margin-bottom:12px">Histórico</div>
    ${monH}
    <div class="fg"><input class="inp" placeholder="Buscar código ou produto..." value="${esc(hSrch)}" oninput="hSrch=this.value;rHistorico(document.getElementById('pg'))"/></div>
    <div class="g2" style="margin-bottom:8px">
      <div><label class="lbl" style="display:block;margin-bottom:4px">De</label><input class="inp" type="date" value="${hFrom}" onchange="hFrom=this.value;rHistorico(document.getElementById('pg'))"/></div>
      <div><label class="lbl" style="display:block;margin-bottom:4px">Até</label><input class="inp" type="date" value="${hTo}" onchange="hTo=this.value;rHistorico(document.getElementById('pg'))"/></div>
    </div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:700">${filt.length} tratativa(s) · ${mesBR(mesSel)}</div>
    <div class="bf">${list}</div>`;
}

// ════════════════════════════════════════════════════
// DETALHE — CARREGA FOTOS DO STORAGE
// ════════════════════════════════════════════════════
function rDetalhe(pc,id){
  // ✅ loadTrat carrega fotos das chaves separadas
  const t=DB.loadTrat(id);
  if(!t){pc.innerHTML=`<div style="padding:20px;color:var(--mut)">Tratativa não encontrada.</div>`;return;}
  const txt=t.txtWA||waText(t.items||[]);
  const allPh=(t.items||[]).flatMap(it=>[
    ...(it.fProd||[]).map(p=>({...p,tipo:'Produto'})),
    ...(it.fBal||[]).map(p=>({...p,tipo:'Balança'})),
    ...(it.fEtq||[]).map(p=>({...p,tipo:'Etiqueta'})),
  ]).filter(p=>p.url);
  const phH=allPh.length
    ?`<div class="lbl" style="margin-bottom:6px">Fotos salvas (${allPh.length})</div><div class="pg" style="margin-bottom:14px">${allPh.map(ph=>`<div class="pt"><img src="${ph.url}" alt="${ph.tipo}"/><div class="plbl">${ph.tipo}</div></div>`).join('')}</div>`
    :`<div style="padding:12px;background:var(--bg2);border-radius:10px;font-size:12px;color:var(--mut);margin-bottom:14px;font-weight:600">Nenhuma foto salva nesta tratativa</div>`;
  const itens=(t.items||[]).map(it=>{const p=ST.prods.find(x=>x.id===it.prodId);const ch2=parseN(it.chegou),qb2=parseN(it.quebra),p2=ch2>0?(qb2/ch2*100).toFixed(1):0;return`<div class="li"><div class="mono" style="font-size:11px;color:var(--gm);font-weight:600">${esc(p?.codigo||'—')}</div><div style="font-size:13px">${esc(p?.nome||'—')}</div><div style="font-size:11px;color:var(--mut);margin-top:2px">Chegou: ${numBR(ch2)} kg · Quebra: ${numBR(qb2)} kg · ${p2}%</div></div>`;}).join('');
  pc.innerHTML=`
    <div class="cr" style="margin-bottom:14px">
      <button class="btn btn-g btn-sm" onclick="navigate('historico')">${ic('bk',15)}</button>
      <div class="sub" style="flex:1;text-align:center">Detalhe</div>
      <span class="bdg ${t.status==='finalizada'?'bok':'bw'}">${t.status||'—'}</span>
    </div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:12px">${new Date(t.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    <div class="lbl" style="margin-bottom:6px">Texto WhatsApp</div>
    <div class="wab" style="margin-bottom:12px">${esc(txt)}</div>
    <div class="lbl" style="margin-bottom:8px">Fotos</div>
    ${phH}
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <button class="btn btn-wa btn-f" onclick="dtWA(${JSON.stringify(t.id)})">${ic('wa',17)} Reenviar para WhatsApp</button>
      <button class="btn btn-g btn-f" onclick="dtCpy(${JSON.stringify(t.id)})">${ic('cpy',15)} Copiar Texto</button>
      <button class="btn btn-g btn-f" onclick="navigate('historico')">${ic('bk',15)} Voltar ao Histórico</button>
    </div>
    ${itens?`<div class="sh"><span class="lbl">Itens</span><div class="shl"></div></div><div class="bf">${itens}</div>`:''}`;
}
async function dtWA(id){
  const t=DB.loadTrat(id);if(!t)return;
  const txt=t.txtWA||waText(t.items||[]);
  const allPh=(t.items||[]).flatMap(it=>[...(it.fProd||[]),...(it.fBal||[]),...(it.fEtq||[])]).filter(p=>p.url);
  const enc=encodeURIComponent(txt);
  if(navigator.share){try{if(allPh.length){const files=await Promise.all(allPh.map(async(ph,i)=>{const r=await fetch(ph.url);const b=await r.blob();return new File([b],`foto_${i}.jpg`,{type:b.type});}));await navigator.share({text:txt,files});return;}await navigator.share({text:txt});return;}catch{}}
  window.open(`https://wa.me/?text=${enc}`,'_blank');
  if(allPh.length)toast(`${allPh.length} foto(s) — adicione manualmente`);
}
function dtCpy(id){const t=DB.loadTrat(id);if(!t)return;navigator.clipboard?.writeText(t.txtWA||waText(t.items||[])).then(()=>toast('Copiado!')).catch(()=>toast('Erro',true));}

// ════════════════════════════════════════════════════
// PWA
// ════════════════════════════════════════════════════
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();ST.instEvt=e;});
if('serviceWorker' in navigator){
  const sw=`const C='flv-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
render();
</script>
