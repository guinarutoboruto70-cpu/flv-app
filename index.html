window.trigNF=type=>{const el=document.getElementById('nf-'+type);if(el){el.value='';el.click()}};
window.processNF=async file=>{
  if(!file)return;
  S.nfLoading=true;renderM();
  try{
    // Load Tesseract.js dynamically if not loaded
    if(!window.Tesseract){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';
        s.onload=res;s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    // Run OCR on the image
    const imgUrl=URL.createObjectURL(file);
    const result=await Tesseract.recognize(imgUrl,'por+eng',{logger:()=>{}});
    URL.revokeObjectURL(imgUrl);
    const text=result.data.text;
    // Parse products from OCR text
    // Look for lines with a number code followed by product name
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
    const produtos=[];
    const seen=new Set();
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      // Pattern: code (4-7 digits) followed by name
      const m=l.match(/^(\d{3,7})\s+(.+)$/);
      if(m){
        const codigo=m[1].trim();
        const nome=m[2].replace(/\s+/g,' ').trim().substring(0,40);
        if(!seen.has(codigo)&&nome.length>2){
          seen.add(codigo);
          produtos.push({c:codigo,n:nome});
        }
      }
    }
    if(!produtos.length)throw new Error('Não foi possível identificar produtos. Tente uma foto mais nítida e iluminada.');
    // Register products that don't exist yet
    const novos=[];
    for(const p of produtos){
      const existe=S.produtos.find(x=>x.c===p.c&&x.at);
      if(!existe){
        S.produtos.push({id:gid(),c:p.c,n:p.n,p:'',m:'5',at:true,cr:new Date().toISOString()});
        novos.push(p);
      }
    }
    save();
    S.nfLoading=false;
    S.nfResult=novos.length>0?novos:[{c:'—',n:'Todos os produtos já estavam cadastrados'}];
    renderM();
  }catch(err){
    S.nfLoading=false;
    toast('⚠ '+( err.message||'Erro ao ler nota. Tente foto mais clara.'));
    renderM();
  }
};

const dashH=()=>{

  const ai=tt.flatMap(t=>t.items);
  const tc=ai.reduce((s,i)=>s+(parseFloat(i.ch)||0),0);
  const tq=ai.reduce((s,i)=>s+(parseFloat(i.qb)||0),0);
  const pct=tc>0?((tq/tc)*100).toFixed(1):'0.0';
  const bp={};ai.forEach(i=>{const p=S.produtos.find(p=>p.id===i.pid);if(!p)return;bp[p.n]=(bp[p.n]||0)+(parseFloat(i.qb)||0)});
  const top=Object.entries(bp).sort((a,b)=>b[1]-a[1]).slice(0,8),mx=top[0]?.[1]||1;
  const insH=S.aiLoad?`<div style="display:flex;align-items:center;gap:8px;padding:12px;color:var(--g)"><div class="spin"></div> Analisando...</div>`:
    S.ai.length>0?`${S.ai.map((x,i)=>`<div class="insight"><strong>#${i+1}</strong> ${esc(x)}</div>`).join('')}<button class="btn bo bf bs mt8" onclick="doAI()">Atualizar análise</button>`:

    <div class="metric"><div class="mlbl">% Quebra</div><div class="mval" style="color:${parseFloat(pct)>5?'var(--r)':'var(--g)'}">${pct}%</div></div>
    <div class="metric"><div class="mlbl">Chegou</div><div class="mval">${tc.toFixed(0)}</div><div class="msub">kg</div></div>
  </div>
  ${top.length>0?`<div class="card" style="margin-top:4px"><div class="ch">${I.chart} Top Quebra</div><div class="cb">${top.map(([n,k])=>`<div class="crow"><div class="clbl">${esc(n)}</div><div class="ctrk"><div class="cfil" style="width:${(k/mx*100).toFixed(1)}%"></div></div><div class="cval">${k.toFixed(1)} kg</div></div>`).join('')}</div></div>`:''}
  <div class="card"><div class="ch">${I.brain} Análise</div><div class="cb">${insH}</div></div></div>`;
};
window.doAI=()=>{
  if(!S.trats.length){toast('Sem dados para analisar');return}
  S.aiLoad=true;renderM();
  
  const insights=[];
  const now=new Date();
  const meta=S.metaGlobal;

  // ── Dados gerais
  const todayStr=today();
  const trats7=S.trats.filter(t=>(now-new Date(t.at))/864e5<=7);
  const trats30=S.trats.filter(t=>(now-new Date(t.at))/864e5<=30);
  const tratsHoje=S.trats.filter(t=>t.at.startsWith(todayStr));

  const soma=(trats,campo)=>trats.flatMap(t=>t.items).reduce((s,i)=>s+(parseFloat(i[campo])||0),0);
  const pct=(qb,ch)=>ch>0?((qb/ch)*100):0;

  const qbHoje=soma(tratsHoje,'qb'), chHoje=soma(tratsHoje,'ch');
  const qb7=soma(trats7,'qb'), ch7=soma(trats7,'ch');
  const qb30=soma(trats30,'qb'), ch30=soma(trats30,'ch');
  const pctHoje=pct(qbHoje,chHoje), pct7=pct(qb7,ch7), pct30=pct(qb30,ch30);

  // ── Insight 1: Status do dia
  if(chHoje>0){
    if(pctHoje>meta){
      insights.push(`🔴 Hoje: quebra de ${pctHoje.toFixed(1)}% — ${(pctHoje-meta).toFixed(1)}pp acima da meta de ${meta}%. Foram perdidos ${qbHoje.toFixed(1)}kg de ${chHoje.toFixed(1)}kg recebidos.`);
    } else {
      insights.push(`✅ Hoje: quebra de ${pctHoje.toFixed(1)}% — dentro da meta de ${meta}%. Perdidos ${qbHoje.toFixed(1)}kg de ${chHoje.toFixed(1)}kg recebidos.`);
    }
  } else {
    insights.push(`📋 Nenhum registro hoje ainda. Meta do dia: ${meta}%.`);
  }

  // ── Insight 2: Produto com maior quebra nos últimos 30 dias
  const bp={};
  trats30.flatMap(t=>t.items).forEach(i=>{
    const p=S.produtos.find(p=>p.id===i.pid);
    if(!p)return;
    if(!bp[p.n])bp[p.n]={qb:0,ch:0};
    bp[p.n].qb+=parseFloat(i.qb)||0;
    bp[p.n].ch+=parseFloat(i.ch)||0;
  });
  const topProd=Object.entries(bp).sort((a,b)=>b[1].qb-a[1].qb)[0];
  if(topProd){
    const [nome,{qb,ch}]=topProd;
    const pp=pct(qb,ch);
    const emoji=pp>meta*2?'🚨':pp>meta?'⚠':'📦';
    insights.push(`${emoji} Maior quebra (30 dias): ${nome} com ${qb.toFixed(1)}kg perdidos (${pp.toFixed(1)}%). ${pp>meta?'Acima da meta — verificar armazenamento.':'Dentro da meta.'}`);
  }

  // ── Insight 3: Tendência semanal vs mensal
  if(ch7>0&&ch30>0){
    const diff=pct7-pct30;
    if(Math.abs(diff)<0.5){
      insights.push(`📊 Quebra estável: ${pct7.toFixed(1)}% na semana vs ${pct30.toFixed(1)}% no mês. Volume recebido nos últimos 7 dias: ${ch7.toFixed(0)}kg.`);
    } else if(diff>0){
      insights.push(`📈 Quebra aumentou: ${pct7.toFixed(1)}% esta semana vs ${pct30.toFixed(1)}% no mês (+${diff.toFixed(1)}pp). Atenção redobrada necessária.`);
    } else {
      insights.push(`📉 Quebra melhorou: ${pct7.toFixed(1)}% esta semana vs ${pct30.toFixed(1)}% no mês (${diff.toFixed(1)}pp). Bom trabalho!`);
    }
  } else if(trats7.length>0){
    insights.push(`📊 Últimos 7 dias: ${trats7.length} tratativa(s), ${qb7.toFixed(1)}kg de quebra total, ${pct7.toFixed(1)}% de quebra.`);
  }

  // ── Insight 4 (bônus): Produto mais eficiente
  const eficiente=Object.entries(bp).filter(([n,{ch}])=>ch>5).sort((a,b)=>pct(a[1].qb,a[1].ch)-pct(b[1].qb,b[1].ch))[0];
  if(eficiente&&Object.keys(bp).length>1){
    const [nome,{qb:q,ch:c}]=eficiente;
    insights.push(`🏆 Menor quebra (30 dias): ${nome} com apenas ${pct(q,c).toFixed(1)}% — referência de bom manuseio.`);
  }

  S.ai=insights.slice(0,4);
  S.aiLoad=false;
  renderM();
};

// Share photo from history
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-hsrc]');
  if(!btn)return;
  const i=parseInt(btn.dataset.hsrc),tid=btn.dataset.htid;
  const t=S.trats.find(t=>t.id===tid);if(!t)return;

  shareFoto(all[i],i);
});

const shareFoto=(src,i)=>{
  if(!src)return;
  fetch(src).then(r=>r.blob()).then(b=>{
    const file=new File([b],`foto_${i+1}.jpg`,{type:'image/jpeg'});
    const markSent=()=>{
      N.sentPhotos.add(i);
      const btn=document.querySelector(`.pv-foto[data-fi="${i}"]`);
      if(btn){btn.style.background='#2d7a3a';btn.style.color='#fff';btn.textContent='✓ Enviada';}
      toast('✓ Foto '+(i+1)+' enviada!');
    };
    if(navigator.share&&navigator.canShare({files:[file]})){
      navigator.share({files:[file]}).then(markSent).catch(()=>{});
    } else {
      const a=document.createElement('a');a.href=src;a.download=`foto_${i+1}.jpg`;a.click();
      markSent();
    }
  }).catch(()=>toast('Erro ao processar foto'));
};

const saveNF=()=>{
  const it=N.items[N.idx];if(!it)return;
  const ch=$('n-ch'),qb=$('n-qb'),dt=$('n-dt');
  if(ch)it.ch=ch.value;
  if(qb)it.qb=qb.value;
  if(dt)it.data=dt.value;
};

const renderN=()=>{
  if(N.step==='preview'){$('main').innerHTML=prevH();bindPrev();return}
  const idx=N.idx,it=N.items[idx];if(!it)return;
  $('main').innerHTML=novaH(idx,it);
  bindNova(idx,it);
};

const novaH=(idx,it)=>{
  const prod=it.pid?S.produtos.find(p=>p.id===it.pid):null;

  const pct=ch>0?(qb/ch*100):0,over=pct>meta,showQ=ch>0&&it.qb!=='';
  const tabs=N.items.map((x,i)=>{const p=S.produtos.find(p=>p.id===x.pid);return`<div class="itab${i===idx?' on':''}" data-ti="${i}">${p?esc(p.c):`Item ${i+1}`}</div>`}).join('');

    <div class="pbtns"><button class="btn bo bs" id="pc-${tipo}">${I.cam} Câmera</button><button class="btn bo bs" id="pg-${tipo}">${I.img} Galeria</button></div>
    <div id="pg2-${tipo}">${fotos.length?pgH(fotos,tipo):''}</div>

    <input type="file" id="pf-${tipo}-g" accept="image/*"${multi?' multiple':''}>
  </div>`;
  // Build recentes list - last 8 unique products used
  const recentPids=[...new Set(S.trats.flatMap(t=>t.items.map(i=>i.pid)))].slice(0,8);
  const recentProds=recentPids.map(pid=>S.produtos.find(p=>p.id===pid&&p.at)).filter(Boolean);
  return`<div style="padding-bottom:8px">
    <div class="stitle"><span>Nova Tratativa</span><button class="btn bo bs" id="n-add">${I.plus} Item</button></div>
    <div class="itabs">${tabs}</div>
    ${recentProds.length>0?`<div class="card"><div class="ch">⚡ Recentes</div><div class="cb"><div class="recents-grid">${recentProds.map(p=>`<button class="rbtn${it.pid===p.id?' rbtn-on':''}" onclick="quickSel('${p.id}')">${esc(p.c)}<span>${esc(p.n.split(' ').slice(0,2).join(' '))}</span></button>`).join('')}</div></div></div>`:''}
    <div class="card"><div class="ch">${I.box} Produto</div><div class="cb">
      <div class="fld"><label class="lbl">Código / Nome</label>
        <div class="acw">
          <input class="inp" id="n-busca" value="${esc(prod?prod.c+' · '+prod.n:'')}" placeholder="Digite código ou nome do produto..." autocomplete="off" inputmode="text">
          <div class="aclist" id="n-acl"></div>
        </div>
        <div id="n-psel">${prod?`<div class="psel">${I.chk}<span>${esc(prod.n)}</span></div>`:''}</div>
      </div>
      <div class="fld"><label class="lbl">Data</label><input class="inp" id="n-dt" type="date" value="${it.data}" max="${today()}"></div>
      <div class="r2">
        <div class="fld"><label class="lbl">Chegou (kg)</label><input class="inp" id="n-ch" type="number" step="0.1" min="0" value="${it.ch||''}" placeholder="0" inputmode="decimal"></div>
        <div class="fld"><label class="lbl">Quebra (kg)</label><input class="inp" id="n-qb" type="number" step="0.1" min="0" value="${it.qb||''}" placeholder="0" inputmode="decimal"></div>
      </div>
      <div id="n-qw" class="qw" style="display:${showQ?'block':'none'}">
        <div class="qtop"><div id="n-qpct" class="qpct" style="color:${over?'var(--r)':'var(--g)'}">${pct.toFixed(1)}%</div><div class="qmeta">meta: ${meta}%</div></div>
        <div class="btrack"><div id="n-qfil" class="bfill" style="width:${Math.min(pct,100).toFixed(1)}%;background:${over?'var(--r)':'linear-gradient(90deg,var(--g2),var(--g3))'}"></div></div>
        <div id="n-qnote" class="qnote">${over?'⚠ Acima da meta — ':''}Percentual interno, não enviado ao WhatsApp</div>
      </div>
    </div></div>
    <div class="card"><div class="ch">${I.cam} Fotos</div><div class="cb">
      ${photoSec('p','Foto do Produto',true,it.fotos.p)}
      ${photoSec('b','Foto da Balança',true,it.fotos.b)}
      ${photoSec('e','Foto da Etiqueta',false,it.fotos.e)}
    </div></div>

const pgH=(fotos,tipo)=>`<div class="pgrid">${fotos.map((src,pi)=>`<div class="pthumb"><img src="${src}" loading="lazy"><button class="pdel" data-t="${tipo}" data-i="${pi}">✕</button><div class="ptyp">${tipo==='p'?'Produto':tipo==='b'?'Balança':'Etiqueta'}</div></div>`).join('')}</div>`;

const updPhotos=(tipo,it)=>{
  const bdg=$(`pb-${tipo}`);if(bdg)bdg.textContent=it.fotos[tipo].length+' foto(s)';
  const grid=$(`pg2-${tipo}`);if(grid)grid.innerHTML=it.fotos[tipo].length?pgH(it.fotos[tipo],tipo):'';
};

const updBar=it=>{
  const ch=parseFloat($('n-ch')?.value)||0;
  const qb=parseFloat($('n-qb')?.value)||0;
  it.ch=$('n-ch')?.value||it.ch;
  it.qb=$('n-qb')?.value||it.qb;
  const prod=S.produtos.find(p=>p.id===it.pid);
  const meta=prod?(parseFloat(prod.m)||5):5;
  const pct=ch>0?(qb/ch*100):0,over=pct>meta;
  const qw=$('n-qw');if(!qw)return;
  if(ch>0&&$('n-qb')?.value!==''){
    qw.style.display='block';
    $('n-qpct').textContent=pct.toFixed(1)+'%';
    $('n-qpct').style.color=over?'var(--r)':'var(--g)';
    $('n-qfil').style.width=Math.min(pct,100).toFixed(1)+'%';
    $('n-qfil').style.background=over?'var(--r)':'linear-gradient(90deg,var(--g2),var(--g3))';
    $('n-qnote').textContent=(over?'⚠ Acima da meta — ':'')+'Percentual interno, não enviado ao WhatsApp';
  } else qw.style.display='none';
};

const bindNova=(idx,it)=>{
  // Tabs
  document.querySelectorAll('[data-ti]').forEach(el=>{el.onclick=()=>{saveNF();N.idx=parseInt(el.dataset.ti);renderN()};});
  // Add/remove item
  $('n-add').onclick=()=>{saveNF();N.items.push(newItem());N.idx=N.items.length-1;renderN()};
  const rmBtn=$('n-rm');if(rmBtn)rmBtn.onclick=()=>{saveNF();N.items.splice(N.idx,1);N.idx=Math.max(0,N.idx-1);renderN()};
  // Preview
  $('n-prev').onclick=()=>{
    saveNF();
    for(const item of N.items){
      if(!item.pid){toast('Selecione um produto em todos os itens');return}
      if(!item.ch||parseFloat(item.ch)<=0){toast('Informe a quantidade que chegou');return}
      if(item.qb===''||parseFloat(item.qb)<0){toast('Informe a quebra (pode ser 0)');return}
    }
    N.step='preview';renderN()
  };
  // Date
  $('n-dt').onchange=function(){it.data=this.value};
  // KG fields
  $('n-ch').onchange=()=>updBar(it);$('n-ch').onblur=()=>updBar(it);
  $('n-qb').onchange=()=>updBar(it);$('n-qb').onblur=()=>updBar(it);
  // Busca produto
  const bEl=$('n-busca'),acl=$('n-acl'),psel=$('n-psel');
  const showAC=v=>{
    if(!v){acl.style.display='none';return}
    const vl=v.toLowerCase();
    const sugs=S.produtos.filter(p=>p.at&&(p.c.toLowerCase().includes(vl)||p.n.toLowerCase().includes(vl))).slice(0,8);
    if(!sugs.length){acl.style.display='none';return}
    acl.innerHTML=sugs.map(p=>`<div class="aci" data-pid="${p.id}"><span class="acode">${esc(p.c)}</span><span class="aname">${esc(p.n)}</span></div>`).join('');
    acl.style.display='block';
  };
  const selProd=p=>{
    it.pid=p.id;
    bEl.value=p.c+' · '+p.n;
    acl.style.display='none';
    psel.innerHTML=`<div class="psel">${I.chk}<span>${esc(p.n)}</span></div>`;
    // update tab
    const tab=document.querySelector(`[data-ti="${idx}"]`);
    if(tab)tab.textContent=esc(p.c);
    updBar(it);
  };
  bEl.oninput=function(){
    if(it.pid){
      const cur=S.produtos.find(p=>p.id===it.pid);
      if(cur&&this.value!==(cur.c+' · '+cur.n)){it.pid=null;psel.innerHTML=''}
    }
    showAC(this.value);
  };
  bEl.onfocus=function(){showAC(this.value)};
  bEl.onblur=()=>setTimeout(()=>{acl.style.display='none'},200);
  // Usar touchstart para mobile - mais responsivo que click
  acl.ontouchstart=e=>{
    const a=e.target.closest('.aci');if(!a)return;
    e.preventDefault();
    const p=S.produtos.find(p=>p.id===a.dataset.pid);
    if(p)selProd(p);
  };
  acl.onmousedown=e=>{
    const a=e.target.closest('.aci');if(!a)return;
    e.preventDefault();
    const p=S.produtos.find(p=>p.id===a.dataset.pid);
    if(p)selProd(p);
  };
  // Fotos
  const setupFoto=(tipo,multi)=>{
    $(`pc-${tipo}`).onclick=()=>{$(`pf-${tipo}-c`).value='';$(`pf-${tipo}-c`).click()};
    $(`pg-${tipo}`).onclick=()=>{$(`pf-${tipo}-g`).value='';$(`pf-${tipo}-g`).click()};
    const handle=files=>{
      Array.from(files).forEach(f=>{
        if(!multi&&it.fotos[tipo].length>=1){toast('Máx 1 foto para etiqueta');return}
        const r=new FileReader();
        r.onload=ev=>{it.fotos[tipo].push(ev.target.result);updPhotos(tipo,it)};
        r.readAsDataURL(f);
      });
    };
    $(`pf-${tipo}-c`).onchange=e=>handle(e.target.files);
    $(`pf-${tipo}-g`).onchange=e=>handle(e.target.files);
  };
  setupFoto('p',true);setupFoto('b',true);setupFoto('e',false);
  // Delete foto
  const delH=e=>{
    const btn=e.target.closest('.pdel');if(!btn)return;
    const tipo=btn.dataset.t,pi=parseInt(btn.dataset.i);
    it.fotos[tipo].splice(pi,1);updPhotos(tipo,it);
  };
};
// Delete foto - listener unico, fora do bindNova
document.addEventListener('click',function(e){
  if(S.tab!=='nova')return;
  var b=e.target.closest('.pdel');if(!b)return;
  var it=N.items[N.idx];if(!it)return;
  it.fotos[b.dataset.t].splice(parseInt(b.dataset.i),1);

});

    </div></div>
    ${allPh.length>0?`<div class="card"><div class="ch">${I.cam} Passo 2 — Fotos (${allPh.length})</div><div class="cb">
      <div style="background:var(--gl);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:var(--t2);line-height:1.5">📲 Toque <strong>Enviar</strong> em cada foto → escolha <strong>WhatsApp</strong> → mesmo contato</div>
      ${allPh.map((f,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--br)"><img src="${f.src}" style="width:52px;height:52px;object-fit:cover;border-radius:9px;flex-shrink:0"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase">${f.lbl}</div></div><button class="btn bo bs pv-foto" data-fi="${i}">${I.wa} Enviar</button></div>`).join('')}
    </div></div>`:''}
    <div style="padding:6px 12px 16px"><button class="btn bo bf" style="padding:13px" id="pv-save">${I.chk} Salvar e Concluir</button></div>
  </div>`;
};
const bindPrev=()=>{
  const wa=genWA(N.items);
  $('pv-back').onclick=()=>{N.step='form';renderN()};
  $('pv-copy').onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText(wa).then(()=>toast('Texto copiado!'))};
  $('pv-wa').onclick=()=>window.open('https://wa.me/?text='+encodeURIComponent(wa),'_blank');
  $('pv-save').onclick=finalizar;
  document.querySelectorAll('.pv-foto').forEach(btn=>{
    btn.onclick=()=>{
      const i=parseInt(btn.dataset.fi);
      const all=N.items.flatMap(it=>[...it.fotos.p,...it.fotos.b,...it.fotos.e]);
      shareFoto(all[i],i);
    };
  });
};
window.quickSel=(pid)=>{
  saveNF();
  const p=S.produtos.find(x=>x.id===pid);
  if(!p)return;
  const it=N.items[N.idx];
  it.pid=p.id;
  // Update the search field and psel without full rerender
  const bEl=$('n-busca');
  if(bEl)bEl.value=p.c+' · '+p.n;
  const psel=$('n-psel');
  if(psel)psel.innerHTML=`<div class="psel">${I.chk}<span>${esc(p.n)}</span></div>`;
  // Update tab label
  const tab=document.querySelector(`[data-ti="${N.idx}"]`);
  if(tab)tab.textContent=esc(p.c);
  // Update recents buttons
  document.querySelectorAll('.rbtn').forEach(b=>{
    const bid=b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    b.classList.toggle('rbtn-on', bid===pid);
  });
  updBar(it);
};
window.editMeta=()=>{
  const v=prompt('Meta global de quebra (%):',S.metaGlobal);
  if(v===null)return;
  const n=parseFloat(v.replace(',','.'));
  if(isNaN(n)||n<0||n>100){toast('Valor inválido');return;}
  S.metaGlobal=n;
  DB.set('flv-meta',n);
  renderM();
  toast('Meta atualizada: '+n+'%');
};
// Check daily meta and show alert
const checkMeta=()=>{
  const td=today();
  const trats_hoje=S.trats.filter(t=>t.at&&t.at.startsWith(td));
  const tq=trats_hoje.reduce((s,t)=>s+t.items.reduce((a,i)=>a+(parseFloat(i.qb)||0),0),0);
  const tc=trats_hoje.reduce((s,t)=>s+t.items.reduce((a,i)=>a+(parseFloat(i.ch)||0),0),0);
  if(tc<=0)return;
  const pct=(tq/tc)*100;
  if(pct>S.metaGlobal){
    setTimeout(()=>{
      toast(`⚠ META ULTRAPASSADA! Quebra hoje: ${pct.toFixed(1)}% (meta: ${S.metaGlobal}%)`,5000);
      // Vibrate if available
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    },500);
  }
};
const finalizar=()=>{
  const items=JSON.parse(JSON.stringify(N.items));
  S.trats.unshift({id:gid(),at:new Date().toISOString(),items,wa:genWA(items)});
  save();toast('Tratativa salva!');checkMeta();
  N.items=[];N.idx=0;N.step='form';
  S.tab='historico';S.histDetail=null;
  nav();renderM();
};

// ── DARK MODE
const initDark=()=>{
  const d=localStorage.getItem('flv-dark')==='1';
  if(d){document.body.classList.add('dark');const b=document.getElementById('dm-btn');if(b)b.textContent='🌙';}
};
window.toggleDark=()=>{
  const isDark=document.body.classList.toggle('dark');
  localStorage.setItem('flv-dark',isDark?'1':'0');
  const b=document.getElementById('dm-btn');
  if(b)b.textContent=isDark?'🌙':'☀';
};
